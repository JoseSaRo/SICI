<!doctype html>
{% load static %}
<!-- Estructura comun, tema visual y bloques base del sistema. -->
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SICI{% endblock %}</title>
    <!-- Seleccion inicial del tema antes de mostrar la pagina. -->
    <script>
      (() => {
        const savedTheme = localStorage.getItem("sici-theme");
        const theme = savedTheme || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="{% static 'inventario/estilos.css' %}?v=20260612-10" />
  </head>
  <body class="{% block body_class %}{% endblock %}">
    {% block body %}{% endblock %}
  </body>
</html>
